name: MobileFrame

on:
  pull_request:
  push:
    branches:
      - main
      - game-helper-app
  workflow_dispatch:

jobs:
  source-validation:
    name: Source validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate workspace
        run: pnpm run mf:validate

  showcase-android-debug:
    name: Showcase Android debug APK
    runs-on: ubuntu-latest
    needs: source-validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006"

      - name: Prime Gradle wrapper
        working-directory: apps/showcase/android
        run: |
          chmod +x ./gradlew
          ./gradlew --version --no-daemon

      - name: Build debug APK
        run: pnpm run mf:android-build:debug

      - name: Summarize runtime evidence
        run: pnpm run mf:runtime-evidence -- --require android.debug-build-evidence --report data/runtime-evidence/runtime-evidence-report.json

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-frame-showcase-debug-apk
          path: |
            apps/showcase/android/app/build/outputs/apk/debug/*.apk
            apps/showcase/android/app/build/outputs/apk/debug/output-metadata.json
            data/runtime-evidence/android/*-debug-build-evidence.json
            data/runtime-evidence/runtime-evidence-report.json
          if-no-files-found: error

  showcase-android-release:
    name: Showcase Android release APK
    runs-on: ubuntu-latest
    needs: source-validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006"

      - name: Prime Gradle wrapper
        working-directory: apps/showcase/android
        run: |
          chmod +x ./gradlew
          ./gradlew --version --no-daemon

      - name: Build release APK scaffold
        run: pnpm run mf:android-build:release -- --allow-debug-release-signing

      - name: Summarize runtime evidence
        run: pnpm run mf:runtime-evidence -- --require android.release-build-evidence --report data/runtime-evidence/runtime-evidence-report.json

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-frame-showcase-release-apk
          path: |
            apps/showcase/android/app/build/outputs/apk/release/*.apk
            apps/showcase/android/app/build/outputs/apk/release/output-metadata.json
            data/runtime-evidence/android/*-release-build-evidence.json
            data/runtime-evidence/runtime-evidence-report.json
          if-no-files-found: error

  showcase-android-runtime:
    name: Showcase Android emulator runtime
    runs-on: ubuntu-latest
    needs: showcase-android-debug
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Download debug APK artifact
        uses: actions/download-artifact@v4
        with:
          name: mobile-frame-showcase-debug-apk
          path: .

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install and launch debug APK
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: default
          arch: x86_64
          script: pnpm run mf:android-runtime-run

      - name: Summarize runtime evidence
        run: pnpm run mf:runtime-evidence -- --require android.runtime-evidence --report data/runtime-evidence/runtime-evidence-report.json

      - name: Upload runtime evidence
        uses: actions/upload-artifact@v4
        with:
          name: mobile-frame-showcase-runtime-evidence
          path: |
            data/runtime-evidence/android/*-runtime-evidence.json
            data/runtime-evidence/runtime-evidence-report.json
          if-no-files-found: error
