pluginManagement { includeBuild("../../../node_modules/.pnpm/node_modules/@react-native/gradle-plugin") }
plugins { id("com.facebook.react.settings") }

def appRoot = settingsDir.parentFile
def repoRoot = appRoot.parentFile.parentFile
def reactNativeGradlePluginPath = new File(repoRoot, "node_modules/.pnpm/node_modules/@react-native/gradle-plugin")
def reactNativeCliPath = new File(repoRoot, "node_modules/@react-native-community/cli/build/bin.js")

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromCommand(
        ["node", reactNativeCliPath.absolutePath, "config"],
        appRoot,
        files(new File(repoRoot, "pnpm-lock.yaml"), new File(appRoot, "package.json"), new File(appRoot, "react-native.config.cjs"))
    )
}
rootProject.name = 'GameHelperAdminMobile'
include ':app'
includeBuild(reactNativeGradlePluginPath.absolutePath)
