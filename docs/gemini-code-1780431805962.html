# mobile-frame 交互与原子组件库开发设计规范 (v1.0)

本交互文档严格基于 `mobile-frame` 基座设计原则编制，作为 L0~L4 层级组件研发及原生能力对接的唯一交互与视觉表现准则。

## 1. 视觉皮肤与全局 Tokens 规范 (L0 层)
* **主体风格：** 纯白简约主义 (Minimalism White Premium)。
* **毛玻璃滤镜 (Frosted Glass)：** 全局非安全区及固定遮罩容器叠加 `blur(25px)` 滤镜，用于状态栏与底部导航条 `MFTabBar`。
* **主色调与强调色：** 浅蓝色 `#007AFF` (iOS Core Blue Standard)。
* **大圆角卡片：** 页面容器、组件卡片（`MFCard` / `MFStatCard`）圆角统一约束为 `24px`。
* **低饱和柔和阴影：** `box-shadow: 0 8px 32px 0 rgba(0, 122, 255, 0.04);`，严格杜绝脏色，保证底色纯净。

## 2. 核心原子组件交互行为 (L2 级)
### MFToast (吐司反馈)
* **交互唤醒：** 居顶向下淡入，常态保持 `1500ms` 后淡出，不可阻断用户屏幕操作。
### MFSheet (半屏抽屉)
* **交互唤醒：** 点击高敏原生授权或高级配置项时从底部拉出，附带黑色 `20%` 阻尼遮罩层。

## 3. 安全合规红线 (L12 级)
* 密码、Token、私钥只准进入本地原生底层 Keychain 隔离区。
* 严禁将业务层敏感字段直接落盘在普通 `AsyncStorage` 中。

            const indexContent = document.getElementById('file-index').value;
            const docContent = document.getElementById('file-doc').value;
            const readmeContent = document.getElementById('file-readme').value;

            // 将各层高价值文件塞入压缩包容器
            zip.file("index.html", indexContent);
            zip.file("interaction_doc.md", docContent);
            zip.file("README.md", readmeContent);

            // 纯前端异步高保真生成 ZIP 二进制大对象
            zip.generateAsync({ type: "blob" }).then(function(blob) {
                // 巧妙利用 HTML5 原生 Blob URL 机制触发纯正浏览器本地下载行为
                const downloadUrl = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = downloadUrl;
                a.download = "mobile-frame-prototype.zip"; // 锁定标准 ZIP 拓展名
                document.body.appendChild(a);
                a.click();
                
                // 释放无用内存
                document.body.removeChild(a);
                URL.revokeObjectURL(downloadUrl);

                // 恢复下载按钮可用状态
                setTimeout(() => {
                    btn.disabled = false;
                    btn.classList.replace('bg-gray-400', 'bg-iosBlue');
                    status.classList.add('hidden');
                }, 1000);
            }).catch(function(err) {
                alert("ZIP包打包发生内部故障: " + err);
            });
        }
    </script>
</body>
</html>
